<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Staff placement test</title>
<style>
  body{ margin:0; background:#14121a; color:#d8d2c8; font-family:monospace; display:flex; gap:24px; padding:20px; }
  canvas{ image-rendering:pixelated; background:#222028; border:1px solid #3a3346; }
  #panel{ font-size:13px; line-height:1.7; }
  b{ color:#ffd84f; }
  .k{ color:#9ad8ff; }
</style>
</head>
<body>
  <canvas id="c" width="600" height="600"></canvas>
  <div id="panel">
    <h3>Colocado de staff</h3>
    <div>HAND (mano en el mago, coords de 120px): <b id="hand"></b></div>
    <div>STAFF_GRIP (agarre en la staff 64px): <b id="grip"></b></div>
    <div>Profundidad: <b id="depth"></b></div>
    <hr>
    <div><span class="k">Flechas</span>: mover HAND ±1 · <span class="k">Shift+Flechas</span>: ±5</div>
    <div><span class="k">F</span>: staff adelante/atrás del mago</div>
    <div><span class="k">G</span>: mostrar/ocultar cruz de la mano</div>
    <div><span class="k">consola</span>: setHand(x,y), setGrip(x,y)</div>
    <hr>
    <div>Mago 120px · staff 64px · escala ×<b id="sc"></b></div>
    <div id="out" style="margin-top:10px;color:#8a8;"></div>
  </div>
<script>
const SCALE = 5;            // zoom del banco de pruebas
const MAGE = 120, STAFF = 64;
let HAND = { x: 44, y: 70 };          // <-- punto de mano en el mago (lo que tuneamos)
let STAFF_GRIP = { x: 32, y: 42 };    // dado por el otro agente
let depthFront = true;                // staff delante del mago (sur)
let showCross = true;
const ox = 40, oy = 30;               // origen de dibujo en el canvas

const frames = [];
let staffImg = null, loaded = 0, total = 10;
for (let i = 0; i < 9; i++) {
  const im = new Image();
  im.onload = () => { if (++loaded === total) start(); };
  im.src = `assets/v2_test/stafftest/frame_00${i}.png`;
  frames.push(im);
}
staffImg = new Image();
staffImg.onload = () => { if (++loaded === total) start(); };
staffImg.src = 'assets/v2_test/stafftest/unknown.png';

const cv = document.getElementById('c'), ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;
document.getElementById('sc').textContent = SCALE;

function readout() {
  document.getElementById('hand').textContent = `{ x: ${HAND.x}, y: ${HAND.y} }`;
  document.getElementById('grip').textContent = `{ x: ${STAFF_GRIP.x}, y: ${STAFF_GRIP.y} }`;
  document.getElementById('depth').textContent = depthFront ? 'adelante' : 'atrás';
}
let t0 = 0;
function start() { t0 = performance.now(); requestAnimationFrame(loop); readout(); }
function loop(t) {
  const fi = Math.floor((t - t0) / 130) % 9;
  ctx.clearRect(0, 0, cv.width, cv.height);
  const drawStaff = () => {
    // la staff se dibuja para que su pixel STAFF_GRIP caiga en HAND del mago
    const sx = ox + (HAND.x - STAFF_GRIP.x) * SCALE;
    const sy = oy + (HAND.y - STAFF_GRIP.y) * SCALE;
    ctx.drawImage(staffImg, sx, sy, STAFF * SCALE, STAFF * SCALE);
  };
  if (!depthFront) drawStaff();
  ctx.drawImage(frames[fi], ox, oy, MAGE * SCALE, MAGE * SCALE);
  if (depthFront) drawStaff();
  if (showCross) { // cruz en el punto de mano
    const hx = ox + HAND.x * SCALE, hy = oy + HAND.y * SCALE;
    ctx.strokeStyle = '#ff3b8b'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(hx - 8, hy); ctx.lineTo(hx + 8, hy);
    ctx.moveTo(hx, hy - 8); ctx.lineTo(hx, hy + 8); ctx.stroke();
  }
  requestAnimationFrame(loop);
}
addEventListener('keydown', e => {
  const d = e.shiftKey ? 5 : 1;
  if (e.key === 'ArrowLeft') HAND.x -= d;
  else if (e.key === 'ArrowRight') HAND.x += d;
  else if (e.key === 'ArrowUp') HAND.y -= d;
  else if (e.key === 'ArrowDown') HAND.y += d;
  else if (e.key.toLowerCase() === 'f') depthFront = !depthFront;
  else if (e.key.toLowerCase() === 'g') showCross = !showCross;
  else return;
  e.preventDefault(); readout();
});
window.setHand = (x, y) => { HAND = { x, y }; readout(); };
window.setGrip = (x, y) => { STAFF_GRIP = { x, y }; readout(); };
window.getValues = () => ({ HAND, STAFF_GRIP, depthFront });
</script>
</body>
</html>
