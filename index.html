<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="El Cuteo">
<meta name="theme-color" content="#0b0a0f">
<title>La Cárcel del Cuteo</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="apple-touch-icon" href="assets/icon-180.png">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚔️</text></svg>">
<style>
  :root{
    --comun:#9aa0a6; --magico:#4f9dff; --raro:#ffd84f; --epico:#c45cff;
    --panel:#16131c; --borde:#3a3346; --texto:#d8d2c8;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ width:100%; height:100%; background:#0b0a0f; overflow:hidden;
    font-family:"Courier New", monospace; color:var(--texto); }
  /* body fijo: mata el scroll elástico de iOS y la barra que empuja todo */
  body{ position:fixed; inset:0; overscroll-behavior:none;
    -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; }
  /* dvh = alto dinámico real del viewport móvil (100vh cuenta la barra del navegador) */
  #wrap{ position:relative; width:100vw; height:100vh; height:100dvh; }
  canvas#game{ position:absolute; inset:0; width:100%; height:100%;
    image-rendering:pixelated; image-rendering:crisp-edges; }

  .hidden{ display:none !important; }
  .panel{ background:var(--panel); border:2px solid var(--borde); border-radius:8px;
    box-shadow:0 0 40px #000c; }

  /* ===== HUD v2 — pixel art (assets de Claude Design, capas + 9-slice) ===== */
  /* --huds: factor de escala (diseñado a 1920 de ancho); lo setea resize() */
  #hud{ position:absolute; inset:0; pointer-events:none;
    /* barras: ancho fijo, alto deriva del aspect 1956/347; separación de los bordes */
    --bw:calc(380px * var(--huds,1)); --barH:calc(95px * var(--huds,1));
    --barBottom:max(36px, 2.2vw); --barMargin:max(46px, 2.6vw); }
  .px{ image-rendering:pixelated; image-rendering:crisp-edges; }

  /* marco de pantalla completa (border-image 9-slice, slice 64) */
  #screenframe{ position:absolute; inset:0; pointer-events:none; z-index:1;
    border:clamp(20px,2.6vw,46px) solid transparent;
    border-image:url(assets/ui/hud/screen_frame.png) 64 stretch; }

  /* barras vital / maná: marco pixel-art de PixelLab (barv2_frame, punta a la izq) +
     relleno tileado en la ventana. Ventana medida: x 15.2%–93.8%, y 25%–73.2%.
     Maná = marco espejado. */
  .hudbar{ position:absolute; bottom:var(--barBottom); width:var(--bw);
    aspect-ratio:224/56; z-index:2; }
  .hudbar.left{ left:var(--barMargin); }
  .hudbar.right{ right:var(--barMargin); transform:scaleX(-1); }
  .hudbar .barwin{ position:absolute; left:15.2%; right:6.2%; top:25%; bottom:26.8%; overflow:hidden; }
  .hudbar .fillclip{ position:absolute; left:0; top:0; bottom:0; width:100%;
    overflow:hidden; transition:width .18s ease-out; }
  .hudbar .filltex{ position:absolute; left:0; top:0; height:100%; width:100%; }
  /* gradiente CILÍNDRICO: negro en bordes → claro al centro → negro (reflejo de tubo) */
  .hudbar.left .filltex{ background:
      linear-gradient(to bottom, #3A0907 0%, #6E1410 16%, #B20403 36%, #FF4136 50%, #B20403 64%, #6E1410 84%, #3A0907 100%); }
  .hudbar.right .filltex{ background:
      linear-gradient(to bottom, #0A1A3A 0%, #123A7E 16%, #0F57B8 36%, #5FA8FF 50%, #0F57B8 64%, #123A7E 84%, #0A1A3A 100%); }
  .hudbar .barframe{ position:absolute; inset:0; width:100%; height:100%; }
  #hptext{ position:absolute; left:15.2%; right:6.2%; top:25%; bottom:26.8%;
    display:flex; align-items:center; justify-content:center;
    font-family:Inter,sans-serif; font-size:calc(20px * var(--huds,1)); font-weight:600;
    color:#fff; text-shadow:0 2px 3px #000; z-index:3; pointer-events:none; }

  /* títulos Cinzel sobre las barras */
  .hudtitle{ position:absolute; bottom:calc(var(--barBottom) + var(--barH) + 4px * var(--huds,1)); z-index:2;
    font-family:Cinzel,serif; font-weight:700; font-size:calc(32px * var(--huds,1));
    text-shadow:0 3px 4px #000; white-space:nowrap; pointer-events:none; }
  #lvltitle{ left:var(--barMargin); color:#e6ddcf; }
  #manatitle{ right:var(--barMargin); color:#9fc6ff; }

  /* runas activas (fila sobre la barra vital) */
  #runes{ position:absolute; left:var(--barMargin); bottom:calc(var(--barBottom) + var(--barH) + 42px * var(--huds,1));
    display:flex; gap:calc(12px * var(--huds,1)); z-index:2; pointer-events:none; }
  #runes img{ width:calc(56px * var(--huds,1)); height:calc(56px * var(--huds,1));
    filter:drop-shadow(0 3px 4px rgba(0,0,0,.6)); }

  /* XP de cadena, centrada abajo */
  #xpwrap{ position:absolute; bottom:calc(14px * var(--huds,1)); left:50%; transform:translateX(-50%);
    width:calc(1000px * var(--huds,1)); height:calc(40px * var(--huds,1)); z-index:2; }
  #xpwrap > img{ position:absolute; inset:0; width:100%; height:100%; }
  #xplevel{ position:absolute; left:50%; bottom:calc(100% + 4px); transform:translateX(-50%);
    font-family:Cinzel,serif; font-weight:700; font-size:calc(30px * var(--huds,1)); color:#e9bc4a;
    text-shadow:0 2px 4px #000, 0 0 8px #000; pointer-events:none; z-index:3; }
  #xpwrap .fillclip{ position:absolute; left:0; top:0; bottom:0; overflow:hidden;
    width:0%; transition:width .18s ease-out; }
  #xpwrap .fillclip img{ position:absolute; left:0; top:0; height:100%;
    width:calc(1000px * var(--huds,1)); max-width:none; }

  /* extras que el diseño no cubre: zona, monedas, pociones, dash, debug (arriba-izq) */
  #hudextra{ position:absolute; left:max(58px, 3.4vw); top:max(54px, 3vw);
    display:flex; flex-direction:column; gap:4px; pointer-events:none; text-shadow:1px 1px 0 #000; }
  #zonelabel{ position:absolute; top:max(28px,2.2vw); left:50%; transform:translateX(-50%);
    font-family:Cinzel,serif; font-size:calc(26px * var(--huds,1)); font-weight:700; color:#e6ddcf;
    letter-spacing:1px; text-shadow:0 2px 5px #000, 1px 1px 0 #000; z-index:2;
    pointer-events:none; white-space:nowrap; }
  #coinlabel{ font-family:Inter,sans-serif; font-size:13px; color:#ffd84f; }
  #potlabel{ font-family:Inter,sans-serif; font-size:13px; color:#f08a88; }
  #stafftest{ pointer-events:auto; align-self:flex-start; margin-top:4px;
    font-family:Inter,sans-serif; font-size:11px; color:#d8d2c8;
    background:#16131cdd; border:1px solid #3a3346; border-radius:4px; padding:3px 5px; }
  #stafftest select{ margin-left:4px; background:#2a2336; color:#ffd84f;
    border:1px solid #5a4a2e; border-radius:3px; font:inherit; }
  /* barra de habilidades sobre la XP: slots circulares (dash + futuras) */
  #abilitybar{ position:absolute; left:0; bottom:calc(100% + 6px); display:flex; gap:calc(8px * var(--huds,1)); }
  .abilityslot{ position:relative; width:calc(58px * var(--huds,1)); height:calc(58px * var(--huds,1)); border-radius:50%;
    background:radial-gradient(circle at 50% 35%, #2a2433, #110d18); border:2px solid #5a4a2e;
    box-shadow:inset 0 0 8px #000c, 0 2px 5px #0008; overflow:hidden; pointer-events:none; }
  #dashicon{ position:absolute; inset:8%; width:84%; height:84%; object-fit:contain; filter:drop-shadow(0 1px 2px #000a); transition:filter .15s; }
  #dashcd{ position:absolute; left:0; top:0; right:0; height:0%; background:rgba(8,6,12,.62); pointer-events:none; transition:height .08s linear; }
  .abilityslot.ready{ border-color:#8fd0ff; box-shadow:inset 0 0 8px #000c, 0 0 9px #8fd0ff55; }
  .abilityslot.ready #dashicon{ filter:drop-shadow(0 0 5px #8fd0ff); }
  #debugboss{ display:none; pointer-events:auto; align-self:flex-start; margin-top:4px;
    font-family:Inter,sans-serif; font-size:10px; padding:3px 8px; cursor:pointer;
    background:#2a1a08; color:#ffb04f; border:1px solid #5a3a18; border-radius:3px;
    letter-spacing:1px; opacity:.7; }
  body.debug #debugboss{ display:block; }
  #debugboss:hover{ opacity:1; border-color:#ffb04f; }
  #perf{ display:none; position:absolute; top:calc(max(54px, 3vw) + 132px); right:max(54px, 3vw);
    min-width:118px; padding:6px 8px; z-index:7; pointer-events:none;
    font-family:Inter,sans-serif; font-size:11px; line-height:1.45; color:#d8d2c8;
    background:#16131cdd; border:1px solid #3a3346; border-radius:4px;
    text-shadow:1px 1px 0 #000; }
  body.debug #perf{ display:block; }
  .perfok{ color:#8ff0a4; }
  .perfwarn{ color:#ffd84f; }
  .perfbad{ color:#ff8a8a; }
  #hint{ position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
    font-size:12px; color:#8a8496; pointer-events:none; text-shadow:1px 1px 0 #000; }
  #prompt{ position:absolute; bottom:60px; left:50%; transform:translateX(-50%);
    font-size:15px; color:#ffd84f; pointer-events:none; text-shadow:1px 1px 0 #000; }
  #minimap{ position:absolute; top:max(54px, 3vw); right:max(54px, 3vw); border:2px solid var(--borde);
    background:#0b0a0fcc; border-radius:4px; image-rendering:pixelated; }
  #toast{ position:absolute; bottom:100px; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:4px; pointer-events:none; }
  .toastmsg{ font-size:13px; padding:4px 12px; background:#16131cd9;
    border:1px solid var(--borde); border-radius:4px; animation:fadeup 2.6s forwards; }
  @keyframes fadeup{ 0%{opacity:0; transform:translateY(8px)} 10%{opacity:1; transform:none}
    75%{opacity:1} 100%{opacity:0} }
  #bigtoast{ position:absolute; top:22%; left:50%; transform:translateX(-50%);
    font-size:26px; font-weight:bold; letter-spacing:2px; text-shadow:2px 2px 0 #000;
    pointer-events:none; opacity:0; }
  #bigtoast.show{ animation:bigfade 2.4s forwards; }
  @keyframes bigfade{ 0%{opacity:0} 15%{opacity:1} 80%{opacity:1} 100%{opacity:0} }

  /* Barra de boss (arriba centrada): nombre AFUERA (arriba), y el marco
     PixelLab pegado a la barra vía border-image 9-slice. Los números van
     DENTRO de la barra. Slice 28/78 = esquinas del PNG recortado (254x64). */
  #bossbar{ position:absolute; top:8px; left:50%;
    transform:translateX(-50%) translateY(-12px);
    width:min(460px, 84vw); display:flex; flex-direction:column;
    align-items:center; gap:2px; pointer-events:none;
    text-shadow:1px 1px 0 #000; opacity:0;
    transition:opacity .45s ease-out, transform .45s ease-out; z-index:6;
    --frame-url:none; }
  #bossbar.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  #bossname{ font-size:14px; font-weight:bold; letter-spacing:3px;
    color:#fff; text-transform:uppercase; }
  /* El marco se aplica como border-image 9-slice. Cada jefe tiene su PNG con
     geometría propia, así que slice y border-width los setea updateBossBar()
     desde BOSS_FRAMES (js/ui.js), calculados para escala 1:1 vertical con el
     track de 20px. */
  #bossframe{ box-sizing:border-box; width:100%;
    border-style:solid; border-color:transparent;
    border-image-repeat:stretch;
    image-rendering:pixelated; }
  .bossbartrack{ position:relative; width:100%; height:20px;
    background:#2a1216; overflow:hidden; }
  #bossbarbleed{ position:absolute; left:0; top:0; bottom:0; width:100%;
    background:linear-gradient(#ffd84f,#d8a82f);
    transition:width .7s ease-out .18s; }
  #bossbarfill{ position:absolute; left:0; top:0; bottom:0; width:100%;
    background:linear-gradient(#e4504f,#a32430);
    transition:width .12s ease-out; }
  #bosshptext{ position:absolute; inset:0; display:flex; align-items:center;
    justify-content:center; font-size:11px; font-weight:bold; color:#fff;
    letter-spacing:1px; }
  @keyframes bosscrit{
    0%,100%{ box-shadow:0 0 6px #c0392b88; }
    50%{ box-shadow:0 0 22px #ff2d2dcc, 0 0 6px #ff6b6b; } }
  #bossbar.crit .bossbartrack{
    animation:bosscrit .9s ease-in-out infinite;
    border-color:#ff6b6b; }
  #bossbar.crit #bossname{ color:#ff8a82; }

  /* Pantallas centradas */
  .screen{ position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px; background:#0b0a0fe6; z-index:10; }
  h1.title{ font-size:42px; letter-spacing:6px; color:#ffd84f; text-shadow:3px 3px 0 #4a2a10; }
  #menu .title{ animation:titlefloat 3.5s ease-in-out infinite; }
  @keyframes titlefloat{
    0%,100%{ transform:translateY(0); text-shadow:3px 3px 0 #4a2a10, 0 0 18px #ffd84f22; }
    50%{ transform:translateY(-6px); text-shadow:3px 3px 0 #4a2a10, 0 0 34px #ffd84f55; }
  }
  .subtitle{ color:#8a8496; font-size:14px; letter-spacing:2px; }
  #loading{ z-index:12; }
  .loadbox{ width:min(520px, 86vw); text-align:center; padding:24px 26px; }
  .loadtitle{ font-family:Cinzel,serif; font-size:28px; color:#ffd84f;
    letter-spacing:4px; text-shadow:2px 2px 0 #4a2a10; }
  #loadmsg{ color:#a8a2b8; font-size:12px; line-height:1.6; min-height:20px; }
  .loadbar{ height:12px; border:1px solid #4c3f66; background:#08060d;
    border-radius:999px; overflow:hidden; box-shadow:inset 0 0 8px #000; }
  #loadfill{ height:100%; width:0%; background:linear-gradient(90deg,#7ec8ff,#ffd84f);
    transition:width .14s ease-out; }
  #loading.error .loadbar{ border-color:#8a2e3a; }
  #loading.error #loadfill{ background:#ff6b6b; }
  #classes{ display:flex; gap:16px; margin-top:10px; }
  .classcard{ width:190px; padding:14px; cursor:pointer; text-align:center;
    transition:transform .1s, border-color .1s; }
  .classcard:hover{ transform:translateY(-4px); border-color:#ffd84f; }
  .classcard canvas{ width:72px; height:auto; image-rendering:pixelated; }
  .classcard h3{ color:#ffd84f; margin:6px 0; letter-spacing:1px; }
  .classcard p{ font-size:11px; color:#a8a2b8; line-height:1.5; min-height:48px; }
  .statline{ font-size:11px; display:flex; justify-content:space-between; padding:1px 8px; }
  .statline b{ color:#d8d2c8; }
  button.btn{ font-family:inherit; font-size:16px; padding:10px 28px; cursor:pointer;
    background:#2a2336; color:#ffd84f; border:2px solid var(--borde); border-radius:6px;
    letter-spacing:2px; }
  button.btn:hover{ border-color:#ffd84f; }

  /* ===== Pantalla de derrota/victoria con marco ornamentado (PixelLab) ===== */
  #endscreen{ background:#0b0a0fee; }
  .deathpanel{ position:relative; height:min(92vh, 680px); aspect-ratio:838/924;
    background:url(assets/ui/defeat_frame.png?v=1) no-repeat center / 100% 100%; }
  .deathpanel #endtitle{ position:absolute; top:4.5%; left:0; right:0; margin:0;
    font-family:Cinzel,serif; font-weight:700;
    font-size:clamp(20px,3.4vh,34px); letter-spacing:4px; text-align:center; }
  /* cada stat apoyada sobre un renglón grabado del marco (renglones en 46.3/53.4/60%) */
  .deathpanel .endstats{ position:absolute; inset:0; font-family:Inter,sans-serif; }
  .deathpanel .endstats > div{ position:absolute; left:9%; right:9%; text-align:center;
    white-space:nowrap; font-size:clamp(11px,1.7vh,15px); }
  .deathpanel .endstats > div:nth-child(1){ top:42.9%; }
  .deathpanel .endstats > div:nth-child(2){ top:50.0%; }
  .deathpanel .endstats > div:nth-child(3){ top:56.6%; }
  .deathpanel .deathbtn{ position:absolute; left:50%; transform:translate(-50%,-50%);
    width:56%; height:7.5%; display:flex; align-items:center; justify-content:center;
    background:transparent; border:none; border-radius:0; padding:0; cursor:pointer;
    font-family:Cinzel,serif; font-weight:600;
    color:#e9bc4a; font-size:clamp(13px,2.1vh,18px); letter-spacing:3px; }
  .deathpanel #endbtn{ top:77.4%; }
  .deathpanel #endbtn2{ top:85.4%; color:#cfc4a8; }
  .deathpanel .deathbtn:hover{ color:#fff; text-shadow:0 0 10px #ffd84faa; }

  /* ===== Inventario v2 — arte ilustrado (slots + mago + marco recortados) ===== */
  #inv{ position:absolute; inset:0; z-index:20; display:flex; align-items:center;
    justify-content:center; background:rgba(8,7,12,.82); }
  .invwrap{ display:flex; align-items:center; justify-content:center; gap:2vw;
    max-width:98vw; max-height:94vh; }
  .invtitle{ position:absolute; left:50%; top:2.5vh; transform:translateX(-50%);
    font-family:Cinzel,serif; font-size:20px; font-weight:700; color:#e9bc4a;
    letter-spacing:3px; text-shadow:0 3px 4px #000; }
  /* zona del mago: columna de octágonos · mago + quick · columna de octágonos */
  .invhero{ display:flex; align-items:center; gap:.8vh; flex:none; }
  .eqcol{ display:flex; flex-direction:column; gap:1vh; }
  .herocenter{ display:flex; flex-direction:column; align-items:center; gap:1vh; }
  .invherostage{ position:relative; display:flex; align-items:flex-end; justify-content:center; }
  .invplatform{ position:absolute; bottom:2vh; left:50%; transform:translateX(-50%); width:34vh; height:19vh; object-fit:fill; pointer-events:none; }
  .invheroimg{ position:relative; height:34vh; width:auto; margin-bottom:1vh; image-rendering:pixelated; pointer-events:none; filter:drop-shadow(0 6px 10px #000a); z-index:1; }
  .invbagcol{ display:flex; flex-direction:column; gap:1vh; align-items:center; }
  .invsortbar{ display:flex; gap:8px; }
  .invsortbtn{ font-family:Cinzel,serif; font-size:calc(13px * var(--huds,1)); color:#e9bc4a; cursor:pointer;
    background:#2a2012; border:1px solid #5a4218; border-radius:5px; padding:4px 12px; letter-spacing:1px; pointer-events:auto; }
  .invsortbtn:hover{ background:#3a2c16; border-color:#e9bc4a; }
  .eqslot{ width:7vh; height:7vh; }
  .invquick{ display:flex; gap:1vh; }
  .qslot{ width:5.6vh; height:5.6vh; }
  /* zona de la mochila: marco a proporción fija + grilla 4×6 en la ventana */
  .invbag{ position:relative; height:64vh; aspect-ratio:947/1331; flex:none; }
  .invframeimg{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
  .baggrid{ position:absolute; left:10.5%; right:10.5%; top:8%; bottom:8%;
    display:grid; grid-template-columns:repeat(4,1fr); grid-template-rows:repeat(6,1fr);
    gap:.5vh; }
  /* slot genérico: la pieza recortada es el background, el ícono va centrado */
  .invslot{ position:relative; background-size:100% 100%; background-repeat:no-repeat;
    display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .invslot.bagcell{ width:100%; height:100%; }
  .invslot .invicon{ width:56%; height:56%; image-rendering:pixelated; object-fit:contain;
    pointer-events:none; }
  .invslot.r-magico .invicon{ filter:drop-shadow(0 0 4px var(--magico)); }
  .invslot.r-raro .invicon{ filter:drop-shadow(0 0 5px var(--raro)); }
  .invslot.r-epico .invicon{ filter:drop-shadow(0 0 6px var(--epico)); }
  /* al agarrar: el slot queda intacto, sólo se "levanta" el ícono (va al ghost) */
  .invslot.dragging .invicon{ visibility:hidden; }
  .invslot:active{ cursor:grabbing; }
  /* ítem "agarrado": más grande que en el slot + sombra, sigue al cursor/dedo */
  .invghost{ position:fixed; width:7vh; height:7vh; pointer-events:none; z-index:100;
    transform:translate(-50%,-50%); image-rendering:pixelated; object-fit:contain;
    filter:drop-shadow(0 5px 7px #000d); }
  /* atributos (franja abajo) e hint (arriba) */
  #statpanel{ position:absolute; left:50%; bottom:2.5vh; transform:translateX(-50%);
    display:flex; gap:16px; flex-wrap:wrap; justify-content:center; max-width:92vw;
    font-family:Inter,sans-serif; font-size:13px; color:#cfc9d6;
    background:#16131cd0; border:1px solid var(--borde); border-radius:8px; padding:8px 18px;
    text-shadow:1px 1px 0 #000; }
  #statpanel b{ color:#ffd84f; }
  .invhint{ position:absolute; left:50%; top:8vh; transform:translateX(-50%);
    font-family:Inter,sans-serif; font-size:11px; color:#8a8496; white-space:nowrap; }

  /* Mercader */
  #shop{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    padding:18px 22px; z-index:20; }
  #shop h2{ color:#ffd84f; letter-spacing:2px; font-size:18px; margin-bottom:4px; }
  .shopcard{ width:130px; min-height:120px; padding:10px; text-align:center; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; }
  .shopcard:hover{ border-color:#ffd84f; }
  .shopcard canvas{ width:36px; height:36px; image-rendering:pixelated; }
  .shopname{ font-size:11px; line-height:1.4; }
  .shopprice{ font-size:13px; color:#ffd84f; font-weight:bold; }
  .shopcard.sold{ opacity:.4; cursor:default; }
  .soldtag{ font-size:12px; color:#8a8496; letter-spacing:2px; }
  .sellprice{ position:absolute; bottom:-2px; right:-2px; font-size:10px;
    color:#ffd84f; background:#16131cd9; padding:0 3px; border-radius:3px;
    pointer-events:none; }

  /* tooltip de ítem con marco ornamentado (PixelLab): pill de nombre, miniatura,
     renglones de stats y caja inferior de comparación. Zonas en % del marco. */
  /* tamaño FIJO 300×450: el marco es 926×1390 → escala 0.324, así las zonas en %
     equivalen a las coords px que definió el diseño (nombre/stats/desc/footer). */
  #tooltip{ position:absolute; z-index:30; pointer-events:none;
    width:300px; height:450px; max-width:none; padding:0;
    background:url(assets/ui/item_tooltip_frame.png?v=1) no-repeat center / 100% 100%;
    font-family:Inter,sans-serif; }
  #tooltip .tt-name{ position:absolute; left:27%; top:10.4%; width:56.2%; height:4.6%;
    display:flex; align-items:center; justify-content:center;
    font-family:Cinzel,serif; font-weight:700; font-size:13px;
    white-space:nowrap; overflow:hidden; }
  #tooltip .tt-icon{ position:absolute; left:5%; top:22%; width:42%; height:31%;
    display:flex; align-items:center; justify-content:center; }
  #tooltip .tt-icon img{ max-width:90%; max-height:90%; object-fit:contain; image-rendering:auto; }
  #tooltip .tt-stats{ position:absolute; left:49.1%; top:21.6%; width:45.4%; height:42.1%;
    font-size:12px; line-height:18.8px; color:#cdc3b0; overflow:hidden; }
  #tooltip .tt-stats .mod{ color:#7fc97f; }
  #tooltip .tt-compare{ position:absolute; left:18.4%; top:68.3%; width:75.6%; height:20.9%;
    font-size:9px; line-height:11px; color:#a89f8c; overflow:hidden; text-align:center; }
  #tooltip .tt-compare .mod{ color:#7fc97f; }
  #tooltip .tt-foot{ position:absolute; left:18.4%; top:94.9%; width:75.6%; height:5.9%;
    display:flex; align-items:center; justify-content:center;
    font-size:10px; letter-spacing:1px; color:#cfc4a8; white-space:nowrap; overflow:hidden; }

  .endstats{ font-size:14px; line-height:2; text-align:center; }
  .endstats b{ color:#ffd84f; }

  /* Pantallas angostas (celular): menú compacto y paneles que entran */
  @media (max-width: 640px) {
    h1.title{ font-size:26px; letter-spacing:3px; text-align:center; }
    .subtitle{ font-size:11px; text-align:center; padding:0 12px; }
    #classes{ gap:8px; }
    .classcard{ width:112px; padding:8px; }
    .classcard p{ display:none; }
    .classcard canvas{ width:48px; }
    .classcard h3{ font-size:13px; }
    .statline{ padding:1px 2px; font-size:10px; }
    .invwrap{ gap:1.5vw; }
    .invhint{ font-size:10px; }
    #statpanel{ font-size:11px; gap:10px; padding:6px 12px; }
    #shop{ max-width:96vw; padding:12px; }
    .shopcard{ width:86px; min-height:96px; padding:6px; }
    #upgchoices{ flex-direction:column; gap:8px; }
  }

  /* Controles táctiles (solo en dispositivos touch) */
  #touchui{ position:absolute; inset:0; pointer-events:none; z-index:5; }
  #joyzone{ position:absolute; left:0; bottom:0; width:45%; height:65%;
    pointer-events:auto; touch-action:none; }
  #joybase{ position:absolute; width:84px; height:84px; border-radius:50%;
    border:2px solid #ffffff44; background:#ffffff11; transform:translate(-50%,-50%); }
  #joyknob{ position:absolute; width:38px; height:38px; border-radius:50%;
    background:#ffffff55; transform:translate(-50%,-50%); }
  .tbtn{ position:absolute; border-radius:50%; pointer-events:auto; touch-action:none;
    background:#ffffff18; border:2px solid #ffffff44; color:#d8d2c8;
    font-family:inherit; font-weight:bold; display:flex; align-items:center;
    justify-content:center; user-select:none; -webkit-user-select:none; }
  #btnatk{ right:24px; bottom:60px; width:84px; height:84px; font-size:15px; }
  #btndash{ right:120px; bottom:30px; width:56px; height:56px; font-size:11px; }
  #btnpot{ right:130px; bottom:100px; width:48px; height:48px; font-size:16px; }
  #btnint{ right:34px; bottom:160px; width:48px; height:48px; font-size:14px; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <canvas id="minimap" class="hidden" width="120" height="120"></canvas>

  <div id="hud" class="hidden">
    <div id="screenframe" class="px"></div>

    <div id="zonelabel"></div>
    <div id="hudextra">
      <div id="coinlabel"></div>
      <div id="potlabel"></div>
      <label id="stafftest">Staff
        <select id="staffselect">
          <option value="-1">auto</option>
          <option value="0">staff 1</option>
          <option value="1">staff 2</option>
          <option value="2">staff 3</option>
          <option value="3">staff 4</option>
          <option value="4">staff 5</option>
          <option value="5">staff 6</option>
          <option value="6">staff 7</option>
          <option value="7">staff 8</option>
          <option value="8">staff 9</option>
        </select>
      </label>
      <button id="debugboss" type="button">→ JEFE (debug)</button>
    </div>

    <div id="runes"></div>
    <div id="perf"></div>

    <div class="hudbar left" id="hpbar">
      <div class="barwin"><div class="fillclip"><div class="filltex"></div></div></div>
      <img class="barframe px" src="assets/ui/hud/barv2_frame.png" alt="">
      <div id="hptext"></div>
    </div>

    <div id="manatitle" class="hudtitle"></div>
    <div class="hudbar right" id="manabar">
      <div class="barwin"><div class="fillclip"><div class="filltex"></div></div></div>
      <img class="barframe px" src="assets/ui/hud/barv2_frame.png" alt="">
    </div>

    <div id="xpwrap">
      <div id="abilitybar"><div id="dashwrap" class="abilityslot"><img id="dashicon" class="px" src="assets/ui/hud/dash_boot.png?v=158" alt="dash"><div id="dashcd"></div></div></div>
      <div id="xplevel"></div>
      <div class="fillclip"><img class="px" src="assets/ui/hud/xp_fill.png" alt=""></div>
      <img class="px" src="assets/ui/hud/xp_frame.png" alt="">
    </div>
  </div>
  <div id="bossbar" class="hidden">
    <div id="bossname"></div>
    <div id="bossframe">
      <div class="bossbartrack">
        <div id="bossbarbleed"></div>
        <div id="bossbarfill"></div>
        <div id="bosshptext"></div>
      </div>
    </div>
  </div>
  <div id="touchui" class="hidden">
    <div id="joyzone"><div id="joybase" class="hidden"><div id="joyknob"></div></div></div>
    <button class="tbtn" id="btnatk">ATK</button>
    <button class="tbtn" id="btndash">DASH</button>
    <button class="tbtn" id="btnpot">⚗</button>
    <button class="tbtn" id="btnint">E</button>
  </div>
  <div id="prompt"></div>
  <div id="bigtoast"></div>
  <div id="toast"></div>
  <div id="hint" class="hidden">WASD mover · ratón apuntar · clic atacar · Espacio dash · Q poción · E interactuar · I inventario · Esc pausa</div>

  <div id="loading" class="screen">
    <div class="loadbox panel">
      <div class="loadtitle">CARGANDO</div>
      <div id="loadmsg">Preparando al Archimago...</div>
      <div class="loadbar"><div id="loadfill"></div></div>
    </div>
  </div>

  <div id="menu" class="screen hidden">
    <h1 class="title">LA CÁRCEL DEL CUTEO</h1>
    <div class="subtitle">un roguelike de fantasía medieval</div>
    <div class="subtitle hidden" id="recordline" style="color:#ffd84f"></div>
    <div class="subtitle">El Archimago espera su condena:</div>
    <div id="classes"></div>
  </div>

  <div id="inv" class="hidden"></div>
  <div id="shop" class="panel hidden"></div>
  <div id="tooltip" class="hidden"></div>

  <div id="upgradescreen" class="screen hidden">
    <h1 class="title" style="font-size:28px">¡SUBISTE DE NIVEL!</h1>
    <div class="subtitle">Elegí una mejora:</div>
    <div id="upgchoices" style="display:flex;gap:16px"></div>
  </div>

  <div id="endscreen" class="screen hidden">
    <div class="deathpanel">
      <h1 class="title" id="endtitle"></h1>
      <div class="endstats" id="endstats"></div>
      <button class="btn deathbtn" id="endbtn">REINTENTAR</button>
      <button class="btn deathbtn" id="endbtn2">MENÚ</button>
    </div>
  </div>

  <div id="pausescreen" class="screen hidden">
    <h1 class="title" style="font-size:30px">PAUSA</h1>
    <div class="endstats" id="pausestats" style="font-size:12px;line-height:1.8"></div>
    <button class="btn" id="resumebtn">CONTINUAR</button>
  </div>
</div>
