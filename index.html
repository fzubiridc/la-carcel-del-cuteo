<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cripta Olvidada</title>
<style>
  :root{
    --comun:#9aa0a6; --magico:#4f9dff; --raro:#ffd84f; --epico:#c45cff;
    --panel:#16131c; --borde:#3a3346; --texto:#d8d2c8;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ width:100%; height:100%; background:#0b0a0f; overflow:hidden;
    font-family:"Courier New", monospace; color:var(--texto); }
  #wrap{ position:relative; width:100vw; height:100vh; }
  canvas#game{ position:absolute; inset:0; width:100%; height:100%;
    image-rendering:pixelated; image-rendering:crisp-edges; }

  .hidden{ display:none !important; }
  .panel{ background:var(--panel); border:2px solid var(--borde); border-radius:8px;
    box-shadow:0 0 40px #000c; }

  /* HUD */
  #hud{ position:absolute; top:10px; left:10px; display:flex; flex-direction:column;
    gap:6px; pointer-events:none; text-shadow:1px 1px 0 #000; }
  #hpbar{ width:220px; height:18px; background:#2a1216; border:2px solid #000;
    border-radius:4px; overflow:hidden; }
  #hpfill{ height:100%; width:100%; background:linear-gradient(#e4504f,#a32430);
    transition:width .15s; }
  #hptext{ font-size:12px; margin-top:-17px; text-align:center; width:220px;
    position:relative; color:#fff; font-weight:bold; }
  #zonelabel{ font-size:14px; font-weight:bold; }
  #coinlabel{ font-size:13px; color:#ffd84f; }
  #hint{ position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
    font-size:12px; color:#8a8496; pointer-events:none; text-shadow:1px 1px 0 #000; }
  #prompt{ position:absolute; bottom:60px; left:50%; transform:translateX(-50%);
    font-size:15px; color:#ffd84f; pointer-events:none; text-shadow:1px 1px 0 #000; }
  #minimap{ position:absolute; top:10px; right:10px; border:2px solid var(--borde);
    background:#0b0a0fcc; border-radius:4px; image-rendering:pixelated; }
  #toast{ position:absolute; bottom:100px; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:4px; pointer-events:none; }
  .toastmsg{ font-size:13px; padding:4px 12px; background:#16131cd9;
    border:1px solid var(--borde); border-radius:4px; animation:fadeup 2.6s forwards; }
  @keyframes fadeup{ 0%{opacity:0; transform:translateY(8px)} 10%{opacity:1; transform:none}
    75%{opacity:1} 100%{opacity:0} }
  #bigtoast{ position:absolute; top:22%; left:50%; transform:translateX(-50%);
    font-size:26px; font-weight:bold; letter-spacing:2px; text-shadow:2px 2px 0 #000;
    pointer-events:none; opacity:0; }
  #bigtoast.show{ animation:bigfade 2.4s forwards; }
  @keyframes bigfade{ 0%{opacity:0} 15%{opacity:1} 80%{opacity:1} 100%{opacity:0} }

  /* Pantallas centradas */
  .screen{ position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px; background:#0b0a0fe6; z-index:10; }
  h1.title{ font-size:42px; letter-spacing:6px; color:#ffd84f; text-shadow:3px 3px 0 #4a2a10; }
  .subtitle{ color:#8a8496; font-size:14px; letter-spacing:2px; }
  #classes{ display:flex; gap:16px; margin-top:10px; }
  .classcard{ width:190px; padding:14px; cursor:pointer; text-align:center;
    transition:transform .1s, border-color .1s; }
  .classcard:hover{ transform:translateY(-4px); border-color:#ffd84f; }
  .classcard canvas{ width:72px; height:72px; image-rendering:pixelated; }
  .classcard h3{ color:#ffd84f; margin:6px 0; letter-spacing:1px; }
  .classcard p{ font-size:11px; color:#a8a2b8; line-height:1.5; min-height:48px; }
  .statline{ font-size:11px; display:flex; justify-content:space-between; padding:1px 8px; }
  .statline b{ color:#d8d2c8; }
  button.btn{ font-family:inherit; font-size:16px; padding:10px 28px; cursor:pointer;
    background:#2a2336; color:#ffd84f; border:2px solid var(--borde); border-radius:6px;
    letter-spacing:2px; }
  button.btn:hover{ border-color:#ffd84f; }

  /* Inventario */
  #inv{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    padding:18px 22px; z-index:20; min-width:560px; }
  #inv h2{ color:#ffd84f; letter-spacing:2px; font-size:18px; margin-bottom:10px; }
  #invbody{ display:flex; gap:24px; }
  .slotgrid{ display:grid; grid-template-columns:repeat(3, 54px); gap:8px; }
  #baggrid{ display:grid; grid-template-columns:repeat(4, 54px); gap:8px; }
  .slot{ width:54px; height:54px; background:#0e0c13; border:2px solid var(--borde);
    border-radius:6px; display:flex; align-items:center; justify-content:center;
    position:relative; cursor:pointer; }
  .slot .ph{ font-size:9px; color:#544d63; text-align:center; pointer-events:none; }
  .slot canvas{ width:40px; height:40px; image-rendering:pixelated; pointer-events:none; }
  .slot.r-comun{ border-color:var(--comun); } .slot.r-magico{ border-color:var(--magico); }
  .slot.r-raro{ border-color:var(--raro); } .slot.r-epico{ border-color:var(--epico); }
  #statpanel{ font-size:12px; line-height:1.9; min-width:150px; }
  #statpanel b{ color:#ffd84f; }
  .invhint{ font-size:10px; color:#8a8496; margin-top:10px; }

  #tooltip{ position:absolute; z-index:30; pointer-events:none; padding:10px 12px;
    font-size:12px; line-height:1.6; max-width:240px; }
  #tooltip .iname{ font-weight:bold; font-size:13px; }
  #tooltip .mod{ color:#7fc97f; }
  #tooltip .cmp{ color:#8a8496; font-size:11px; margin-top:6px; border-top:1px solid var(--borde); padding-top:4px; }

  .endstats{ font-size:14px; line-height:2; text-align:center; }
  .endstats b{ color:#ffd84f; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <canvas id="minimap" class="hidden" width="120" height="120"></canvas>

  <div id="hud" class="hidden">
    <div id="zonelabel"></div>
    <div id="hpbar"><div id="hpfill"></div></div>
    <div id="hptext"></div>
    <div id="coinlabel"></div>
  </div>
  <div id="prompt"></div>
  <div id="bigtoast"></div>
  <div id="toast"></div>
  <div id="hint" class="hidden">WASD / flechas mover · ratón apuntar · clic atacar · E interactuar · I inventario · Esc pausa</div>

  <div id="menu" class="screen">
    <h1 class="title">CRIPTA OLVIDADA</h1>
    <div class="subtitle">un roguelike de fantasía medieval</div>
    <div class="subtitle">Elegí tu clase:</div>
    <div id="classes"></div>
  </div>

  <div id="inv" class="panel hidden"></div>
  <div id="tooltip" class="panel hidden"></div>

  <div id="endscreen" class="screen hidden">
    <h1 class="title" id="endtitle"></h1>
    <div class="endstats" id="endstats"></div>
    <button class="btn" id="endbtn">VOLVER A INTENTAR</button>
  </div>

  <div id="pausescreen" class="screen hidden">
    <h1 class="title" style="font-size:30px">PAUSA</h1>
    <button class="btn" id="resumebtn">CONTINUAR</button>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/sprites.js"></script>
<script src="js/dungeon.js"></script>
<script src="js/items.js"></script>
<script src="js/entities.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
